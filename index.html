<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Store</title>

<link rel="stylesheet" href="style.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">🎮 GameStore</a>
</div>
</nav>

<!-- Hero -->
<div class="container text-center my-5">
<h1>Buy Games Online</h1>
<p>Best place to buy PC & Mobile games</p>
</div>

<!-- Games -->
<div class="container">
<div class="row">

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200" class="card-img-top">
<div class="card-body text-center">
<h5>Free Fire</h5>
<p>Price ₹499</p>
<button class="btn btn-success" onclick="buyGame('Free Fire')">Buy</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200" class="card-img-top">
<div class="card-body text-center">
<h5>GTA V</h5>
<p>Price ₹1999</p>
<button class="btn btn-warning" onclick="buyGame('GTA V')">Buy</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200" class="card-img-top">
<div class="card-body text-center">
<h5>Call Of Duty</h5>
<p>Price ₹2499</p>
<button class="btn btn-danger" onclick="buyGame('Call Of Duty')">Buy</button>
</div>
</div>
</div>

</div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
© 2026 GameStore
</footer>

<script src="script.js"></script>

</body>
</html>
